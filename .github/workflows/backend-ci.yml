name: Backend CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt

    - name: Lint with ruff
      run: |
        # stop the build if there are Python syntax errors or undefined names
        ruff check .

    - name: Test with pytest
      run: |
        pytest
    env:
        # Mocking environment variables for CI tests
        NEO4J_URI: "bolt://localhost:7687"
        NEO4J_USER: "neo4j"
        NEO4J_PASSWORD: "password"
        FIREBASE_PROJECT_ID: "kinetik-1234"
        DEBUG_MODE: "true"

  deploy:
    name: Deploy to Cloud Run
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - uses: actions/checkout@v4

    - name: Google Auth
      id: auth
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'

    - name: 'Authorize Docker push'
      run: gcloud auth configure-docker --quiet

    - name: 'Build and Push Container'
      run: |
        docker build -t gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetik-backend:${{ github.sha }} ./backend
        docker push gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetik-backend:${{ github.sha }}

    - name: 'Deploy to Cloud Run'
      uses: 'google-github-actions/deploy-cloudrun@v2'
      with:
        service: 'kinetik-backend'
        image: 'gcr.io/${{ secrets.GCP_PROJECT_ID }}/kinetik-backend:${{ github.sha }}'
        region: 'us-central1'
        env_vars: |
          NEO4J_URI=${{ secrets.NEO4J_URI }}
          NEO4J_USER=${{ secrets.NEO4J_USER }}
          NEO4J_PASSWORD=${{ secrets.NEO4J_PASSWORD }}
          FIREBASE_PROJECT_ID=kinetik-1234
